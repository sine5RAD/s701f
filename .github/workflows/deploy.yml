name: Deploy (pnpm)

on:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.12.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build site
              run: pnpm build

            - name: Deploy to pages branch
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: pages
                  folder: dist
                  clean: true

            - name: SSH Connect to remote server
              run:
                  ssh -i ${{ secrets.SSH_PRIVATE_KEY }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
                  cd ${{ secrets.DEPLOY_PATH }}
                  git pull origin pages
