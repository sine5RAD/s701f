name: Deploy (pnpm)

on:
    push:
        branches:
            - main
            - master
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Enable pnpm
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build site
              run: pnpm build

            - name: Deploy to pages branch
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  branch: pages
                  folder: dist
                  clean: true
